# ──────────────────────────────────────────────────────────────────────────────
# FIX 1: Replaced MySQL with H2 in-memory so the app runs without any external
#         database server.  To switch to MySQL:
#           1. Add mysql-connector-j back to pom.xml
#           2. Uncomment the three MySQL lines below and comment out H2 lines
#           3. Create the schema:  CREATE DATABASE ecommerce_db;
#           4. Set DB_USER / DB_PASS environment variables (never hardcode them)
# ──────────────────────────────────────────────────────────────────────────────

# --- H2 (default / development) ----------------------------------------------
spring.datasource.url=jdbc:h2:mem:ecommerce_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console – reachable at http://localhost:9090/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- MySQL (uncomment to switch) ---------------------------------------------
# spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db?useSSL=false&serverTimezone=UTC
# spring.datasource.username=${DB_USER}
# spring.datasource.password=${DB_PASS}

# --- JPA / Hibernate ---------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# FIX 2: explicitly set dialect so Hibernate doesn't have to guess
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# --- Server ------------------------------------------------------------------
server.port=9090

# --- JWT ---------------------------------------------------------------------
# FIX 3: JWT secret read from environment variable; falls back to a dev-only
#         default.  In production always set JWT_SECRET to a 256-bit random value.
app.jwt.secret=${JWT_SECRET:dev-only-secret-change-in-production-min32chars!}
app.jwt.expiration-ms=86400000
