# H2 in-memory database (no external DB needed)
spring.datasource.url=jdbc:h2:mem:ecommerce_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

server.port=${PORT:9090}

# JWT secret MUST be overridden via JWT_SECRET env var in production
app.jwt.secret=${JWT_SECRET:LocalDevOnlySecretMustBeChanged_Min32Chars!!}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
